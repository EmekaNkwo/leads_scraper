services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: leads-scraper-backend
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - ./backend/csv_exports:/app/csv_exports
      - ./backend/checkpoints:/app/checkpoints
      - ./backend/logs:/app/logs
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: leads-scraper-frontend
    depends_on:
      backend:
        condition: service_healthy
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "3000:3000"
    restart: unless-stopped
